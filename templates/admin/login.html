<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>啟英高中國際處 - 後台登入</title>
    <style>
        body { font-family: 'Noto Sans TC', sans-serif; background: #faf8f4; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-box { background: #0d1f3c; color: white; padding: 2rem; border-radius: 12px; width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .login-box h2 { text-align: center; color: #e8b85a; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-size: 13px; color: rgba(255,255,255,0.7); }
        .form-group input { width: 100%; padding: 10px; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; background: rgba(255,255,255,0.1); color: white; box-sizing: border-box;}
        .btn { width: 100%; padding: 10px; background: #c4963a; color: #0d1f3c; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px;}
        .btn:hover { background: #e8b85a; }
        .error { color: #ff6b6b; font-size: 13px; text-align: center; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>管理員登入</h2>
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="POST" action="/admin/login">
            <div class="form-group">
                <label>帳號</label>
                <input type="text" name="username" required>
            </div>
            <div class="form-group">
                <label>密碼</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">登入</button>
        </form>
    </div>
</body>
</html>
